<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#f9f9fb",
              "on-secondary-fixed": "#1c075a",
              "surface": "#f9f9fb",
              "secondary": "#6053a0",
              "secondary-fixed-dim": "#cabeff",
              "surface-variant": "#e2e2e4",
              "on-error": "#ffffff",
              "surface-tint": "#13696a",
              "outline": "#6f7979",
              "outline-variant": "#bec9c8",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed-dim": "#ffb3af",
              "primary": "#006162",
              "surface-container": "#eeeef0",
              "on-secondary": "#ffffff",
              "inverse-on-surface": "#f0f0f2",
              "on-surface": "#1a1c1d",
              "on-tertiary": "#ffffff",
              "primary-fixed-dim": "#89d3d4",
              "on-primary-fixed": "#002020",
              "surface-container-high": "#e8e8ea",
              "on-tertiary-fixed-variant": "#8c151e",
              "inverse-surface": "#2f3132",
              "surface-bright": "#f9f9fb",
              "error": "#ba1a1a",
              "on-error-container": "#93000a",
              "secondary-container": "#b9abff",
              "on-surface-variant": "#3f4949",
              "surface-dim": "#d9dadc",
              "on-background": "#1a1c1d",
              "on-secondary-container": "#493c87",
              "primary-container": "#2c7a7b",
              "on-primary": "#ffffff",
              "surface-container-highest": "#e2e2e4",
              "secondary-fixed": "#e6deff",
              "on-tertiary-fixed": "#410005",
              "error-container": "#ffdad6",
              "on-primary-container": "#c1ffff",
              "on-primary-fixed-variant": "#004f50",
              "tertiary": "#a3272c",
              "primary-fixed": "#a5eff0",
              "tertiary-fixed": "#ffdad7",
              "inverse-primary": "#89d3d4",
              "tertiary-container": "#c54042",
              "on-tertiary-container": "#fff0ef",
              "on-secondary-fixed-variant": "#483b86",
              "surface-container-low": "#f3f3f5"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
<div class="w-full max-w-md min-h-screen flex flex-col bg-surface shadow-sm relative overflow-hidden">
<!-- Progress Bar Section -->
<div class="px-5 pt-10 pb-6 w-full">
<div class="h-1 w-full bg-surface-container rounded-full flex gap-1 overflow-hidden">
<div class="h-full flex-1 bg-primary-container rounded-full"></div>
<div class="h-full flex-1 bg-primary-container rounded-full"></div>
<div class="h-full flex-1 bg-primary-container rounded-full"></div>
</div>
</div>
<!-- Content Area -->
<main class="flex-grow px-5 flex flex-col items-start">
<!-- Icon & Heading -->
<div class="mb-8">
<div class="w-12 h-12 rounded-2xl bg-teal-50 flex items-center justify-center mb-6 text-primary">
<span class="material-symbols-outlined" style="font-size: 28px;">shield</span>
</div>
<h1 class="text-[28px] font-medium tracking-tight text-on-surface mb-2">Emergency contacts</h1>
<p class="text-[14px] text-on-surface-variant leading-relaxed font-light">
                    We'll call this person when you trigger SOS
                </p>
</div>
<!-- Form Fields -->
<div class="w-full space-y-10 mt-4">
<!-- Primary Contact -->
<div class="space-y-6">
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 focus:ring-0 focus:border-primary text-[15px] placeholder:text-outline-variant/60 font-light transition-colors" placeholder="Primary contact name" type="text"/>
</div>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 focus:ring-0 focus:border-primary text-[15px] placeholder:text-outline-variant/60 font-light transition-colors" placeholder="Phone" type="tel"/>
</div>
</div>
<!-- Secondary Contact -->
<div class="space-y-6 pt-2">
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 focus:ring-0 focus:border-primary text-[15px] placeholder:text-outline-variant/60 font-light transition-colors" placeholder="Secondary contact name (optional)" type="text"/>
</div>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 focus:ring-0 focus:border-primary text-[15px] placeholder:text-outline-variant/60 font-light transition-colors" placeholder="Phone" type="tel"/>
</div>
</div>
</div>
<!-- Disclaimer -->
<div class="mt-8 flex items-center gap-2 text-on-surface-variant/70">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span class="text-[13px] font-light">Stored only on your device. Never shared.</span>
</div>
</main>
<!-- Footer / Action Area -->
<footer class="p-6 pb-12 w-full">
<button class="w-full py-4 px-6 rounded-full bg-gradient-to-tr from-primary to-primary-container text-on-primary text-[15px] font-medium tracking-wide shadow-sm active:scale-95 transition-all">
                Complete Setup
            </button>
</footer>
<!-- Decorative Subtle Element -->
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
</div>
</body></html>
