<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#f9f9fb",
              "on-secondary-fixed": "#1c075a",
              "surface": "#f9f9fb",
              "secondary": "#6053a0",
              "secondary-fixed-dim": "#cabeff",
              "surface-variant": "#e2e2e4",
              "on-error": "#ffffff",
              "surface-tint": "#13696a",
              "outline": "#6f7979",
              "outline-variant": "#bec9c8",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed-dim": "#ffb3af",
              "primary": "#006162",
              "surface-container": "#eeeef0",
              "on-secondary": "#ffffff",
              "inverse-on-surface": "#f0f0f2",
              "on-surface": "#1a1c1d",
              "on-tertiary": "#ffffff",
              "primary-fixed-dim": "#89d3d4",
              "on-primary-fixed": "#002020",
              "surface-container-high": "#e8e8ea",
              "on-tertiary-fixed-variant": "#8c151e",
              "inverse-surface": "#2f3132",
              "surface-bright": "#f9f9fb",
              "error": "#ba1a1a",
              "on-error-container": "#93000a",
              "secondary-container": "#b9abff",
              "on-surface-variant": "#3f4949",
              "surface-dim": "#d9dadc",
              "on-background": "#1a1c1d",
              "on-secondary-container": "#493c87",
              "primary-container": "#2c7a7b",
              "on-primary": "#ffffff",
              "surface-container-highest": "#e2e2e4",
              "secondary-fixed": "#e6deff",
              "on-tertiary-fixed": "#410005",
              "error-container": "#ffdad6",
              "on-primary-container": "#c1ffff",
              "on-primary-fixed-variant": "#004f50",
              "tertiary": "#a3272c",
              "primary-fixed": "#a5eff0",
              "tertiary-fixed": "#ffdad7",
              "inverse-primary": "#89d3d4",
              "tertiary-container": "#c54042",
              "on-tertiary-container": "#fff0ef",
              "on-secondary-fixed-variant": "#483b86",
              "surface-container-low": "#f3f3f5"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .inset-divider {
            position: relative;
        }
        .inset-divider::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 0;
            height: 1px;
            background-color: #EBEBF0;
        }
        .last-no-divider::after {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl border-b border-slate-200/20 flex justify-between items-center h-[56px] px-5 transition-all duration-200 ease-in-out">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-teal-700">menu</span>
<h1 class="text-lg font-medium tracking-tight text-slate-900 font-headline">My Info</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 hover:bg-slate-100/50 rounded-full transition-colors">
<span class="material-symbols-outlined text-teal-700" data-icon="edit">edit</span>
</button>
</div>
</header>
<main class="pt-20 pb-24 px-5 max-w-md mx-auto">
<!-- Summary Card (Responder View) -->
<section class="mb-8 relative bg-surface-container-lowest rounded-[14px] p-5 shadow-none border-l-[4px] border-primary">
<div class="flex flex-col gap-3">
<div>
<span class="inline-block bg-teal-50 text-primary text-[10px] font-medium px-2 py-0.5 rounded-full tracking-wide mb-2 uppercase">Show this to a responder</span>
<h2 class="text-[17px] font-500 text-on-surface">Noopur, 25</h2>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-error text-sm" style="font-variation-settings: 'FILL' 1;">emergency</span>
<p class="text-[13px] font-500 text-error">Allergy: Penicillin</p>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-400 text-sm">contact_phone</span>
<p class="text-[13px] font-400 text-on-surface-variant">Mom — +1 (555) 234-5678</p>
</div>
</div>
</div>
</section>
<!-- Detailed Settings List -->
<div class="bg-surface-container-lowest rounded-2xl overflow-hidden mb-6">
<!-- Name & Age -->
<button class="w-full flex items-center justify-between h-[52px] px-4 hover:bg-surface-container transition-colors inset-divider">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">person</span>
<span class="text-[15px] font-400">Name &amp; Age</span>
</div>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</button>
<!-- Allergies -->
<button class="w-full flex items-center justify-between h-[52px] px-4 hover:bg-surface-container transition-colors inset-divider">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">warning</span>
<span class="text-[15px] font-400">Allergies</span>
</div>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</button>
<!-- Conditions -->
<button class="w-full flex items-center justify-between h-[52px] px-4 hover:bg-surface-container transition-colors inset-divider">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">monitor_heart</span>
<span class="text-[15px] font-400">Conditions</span>
</div>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</button>
<!-- Medications -->
<button class="w-full flex items-center justify-between h-[52px] px-4 hover:bg-surface-container transition-colors inset-divider">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">medication</span>
<span class="text-[15px] font-400">Medications</span>
</div>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</button>
<!-- Emergency Contacts -->
<button class="w-full flex items-center justify-between h-[52px] px-4 hover:bg-surface-container transition-colors inset-divider last-no-divider">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">group</span>
<span class="text-[15px] font-400">Emergency Contacts</span>
</div>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</button>
</div>
<p class="text-center text-[11px] font-300 text-secondary tracking-wide opacity-80 px-10">
            Stored only on this device
        </p>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full h-[64px] bg-white border-t border-slate-200 flex justify-around items-center px-2 pb-safe z-50">
<div class="flex flex-col items-center justify-center text-slate-400 px-5 py-1 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="medical_services">medical_services</span>
<span class="font-label text-[11px] font-light tracking-wide mt-1">Guides</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 px-5 py-1 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="emergency">emergency</span>
<span class="font-label text-[11px] font-light tracking-wide mt-1">Emergency</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 px-5 py-1 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="first_aid">wounds_injuries</span>
<span class="font-label text-[11px] font-light tracking-wide mt-1">Supplies</span>
</div>
<div class="flex flex-col items-center justify-center bg-teal-50 text-teal-700 rounded-2xl px-5 py-1 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label text-[11px] font-light tracking-wide mt-1">Profile</span>
</div>
</nav>
</body></html>
